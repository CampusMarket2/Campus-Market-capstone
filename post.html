<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Item | Campus Market</title>
  <meta name="require-auth" content="true">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .post-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .upload-zone {
      border: 2px dashed var(--purple);
      background: var(--surface-2);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      overflow: hidden;
    }
    .upload-zone:hover {
      background: rgba(108, 99, 255, 0.1);
    }
    .upload-zone img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }

    .radio-cards {
      display: flex;
      gap: 12px;
    }
    .radio-card {
      flex: 1;
      text-align: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }
    .radio-card.active {
      border-color: var(--purple);
      background: rgba(108, 99, 255, 0.1);
      color: var(--purple);
    }

    @media (max-width: 768px) {
      .post-container { grid-template-columns: 1fr; margin: 20px; padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="home.html" class="logo">Campus<span>Market</span></a>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="container" style="padding-top: 20px;">
    <div class="muted" style="font-size: 0.9rem;"><a href="home.html">Home</a> > Post an Item</div>
    
    <div class="post-container glass">
      <!-- LEFt COL -->
      <div>
        <h2 class="syne mb-3">Item Details</h2>
        <div class="form-group">
          <label>Item Title*</label>
          <input type="text" id="p-title" placeholder="What are you selling?" required>
        </div>
        <div class="form-group">
          <label>Category*</label>
          <select id="p-cat" required>
            <option value="" disabled selected>Select Category</option>
            <option value="Textbooks">Textbooks</option>
            <option value="Electronics">Electronics</option>
            <option value="Accommodation">Accommodation</option>
            <option value="Services">Services</option>
            <option value="Lost & Found">Lost & Found</option>
          </select>
        </div>
        <div class="form-group" id="cond-group">
          <label>Condition*</label>
          <div class="radio-cards">
            <div class="radio-card active" data-val="New ✨">New ✨</div>
            <div class="radio-card" data-val="Used 📦">Used 📦</div>
            <div class="radio-card" data-val="Fairly Used 🔄">Fair</div>
          </div>
          <input type="hidden" id="p-cond" value="New ✨">
        </div>
        <div class="form-group" id="price-group">
          <label>Price (GHS)*</label>
          <input type="number" id="p-price" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Description*</label>
          <textarea id="p-desc" rows="5" placeholder="Describe the item..." required maxlength="300"></textarea>
          <div style="text-align: right; font-size: 0.8rem; color: var(--purple);" id="char-count">0/300</div>
        </div>
      </div>

      <!-- RIGHT COL -->
      <div>
        <h2 class="syne mb-3">Contact & Image</h2>
        <div class="form-group">
          <label>Location on Campus*</label>
          <select id="p-loc" required>
            <option value="University Hall (Katanga)">University Hall</option>
            <option value="Unity Hall (Conti)">Unity Hall</option>
            <option value="Africa Hall">Africa Hall</option>
            <option value="Ayeduase (Off-campus)">Ayeduase</option>
            <option value="SRC Canteen">SRC Canteen</option>
            <option value="Gaza">Gaza</option>
          </select>
        </div>
        <div class="form-group">
          <label>WhatsApp Number*</label>
          <input type="tel" id="p-phone" required>
        </div>
        <div class="form-group">
          <label>Contact Email</label>
          <input type="email" id="p-email">
        </div>
        
        <div class="form-group mt-3">
          <label>Upload Image</label>
          <div class="upload-zone" id="img-zone">
            <i class='bx bx-cloud-upload' style="font-size: 2.5rem; color: var(--purple);"></i>
            <p class="mt-1">Click to browse or drag image</p>
            <img id="img-preview" src="">
            <input type="file" id="p-file" accept="image/*" style="display: none;">
          </div>
        </div>

        <button class="btn btn-primary mt-4" style="width: 100%;" id="btn-submit">Post Item 🚀</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const user = requireAuth();
    
    // Prefill
    document.getElementById('p-phone').value = DB.getUsers().find(u=>u.id===user.id)?.phone || '';
    document.getElementById('p-email').value = user.email;

    // Condition UI
    document.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        document.getElementById('p-cond').value = card.getAttribute('data-val');
      });
    });

    // Category changes
    document.getElementById('p-cat').addEventListener('change', (e) => {
      const val = e.target.value;
      if(val === 'Lost & Found' || val === 'Services') {
        document.getElementById('cond-group').style.display = 'none';
      } else {
        document.getElementById('cond-group').style.display = 'block';
      }
      if(val === 'Lost & Found') document.getElementById('price-group').style.display = 'none';
      else document.getElementById('price-group').style.display = 'block';
    });

    // Char count
    const desc = document.getElementById('p-desc');
    desc.addEventListener('input', () => {
      document.getElementById('char-count').innerText = `${desc.value.length}/300`;
    });

    // File Upload
    let base64Img = null;
    const zone = document.getElementById('img-zone');
    const fileIn = document.getElementById('p-file');
    const preview = document.getElementById('img-preview');
    
    zone.addEventListener('click', () => fileIn.click());
    fileIn.addEventListener('change', async (e) => {
      if(e.target.files[0]) {
        try {
          base64Img = await fileToBase64(e.target.files[0]);
          preview.src = base64Img;
          preview.style.display = 'block';
        } catch(err) { showToast('Image processing failed', 'error'); }
      }
    });

    // Submit
    document.getElementById('btn-submit').addEventListener('click', () => {
      const title = document.getElementById('p-title').value;
      const cat = document.getElementById('p-cat').value;
      if(!title || !cat || !desc.value) return showToast('Please fill all required fields', 'error');

      const listing = {
        id: generateId(),
        title,
        category: cat,
        condition: document.getElementById('cond-group').style.display !== 'none' ? document.getElementById('p-cond').value : null,
        price: document.getElementById('p-price').value || null,
        description: desc.value,
        location: document.getElementById('p-loc').value,
        phone: document.getElementById('p-phone').value,
        contactEmail: document.getElementById('p-email').value,
        image: base64Img,
        sellerName: user.name,
        sellerEmail: user.email,
        createdAt: new Date().toISOString(),
        sold: false
      };

      DB.saveListing(listing);
      showToast('✅ Your item is now live!', 'success');
      setTimeout(() => window.location.href = "home.html", 1500);
    });
  </script>
</body>
</html>
